<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>Recruit.org.in - India’s Next-Gen Career, Job, and MSME Growth Engine</title>
    <meta name="description" content="Empowering India's students, young professionals, and MSMEs. Get live career guidance from AI assistant Arohi, dynamic resume analysis, mock interviews, job postings, and Udyam business assistance." />
    <meta name="keywords" content="recruit.org.in, career guidance India, AI career coach, resume score India, mock interview simulator, MSME Udyam registration, private sector jobs, student career advisor, recruitment portal, Sarkari job guide" />
    <meta name="author" content="Recruit.org.in" />
    <meta name="robots" content="index, follow" />
    
    <!-- Geo-targeting for India -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.position" content="20.5937;78.9629" />
    <meta name="ICBM" content="20.5937, 78.9629" />

    <!-- Open Graph / Facebook / WhatsApp Meta Tags for Virality and Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://recruit.org.in" />
    <meta property="og:title" content="Recruit.org.in - Career & MSME Success Engine" />
    <meta property="og:description" content="AI-driven career development, skill pathing, professional resume evaluation, and custom MSME Business support. Connect with India's best opportunities." />
    <meta property="og:image" content="https://recruit.org.in/assets/og-banner.jpg" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recruit.org.in - Career & MSME Success Engine" />
    <meta name="twitter:description" content="Unlock live interactive career planning, premium resume analysis, mock interview sessions, and business growth support powered by Arohi AI." />
    <meta name="twitter:image" content="https://recruit.org.in/assets/og-banner.jpg" />

    <!-- Structured JSON-LD Data for Google Rich Snippets / SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Recruit.org.in",
        "url": "https://recruit.org.in",
        "logo": "https://recruit.org.in/assets/logo.png",
        "description": "India's next-generation employment engine helping students, professionals, and MSMEs achieve career and business milestones.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN"
        },
        "sameAs": [
          "https://twitter.com/RecruitOrgIn",
          "https://www.linkedin.com/company/recruitorgin"
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Recruit.org.in",
        "url": "https://recruit.org.in",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://recruit.org.in/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
